name: Install and Test xprin and xprin-helpers

on:
  pull_request:
    paths:
      - Formula/xprin*.rb

jobs:
  install-test-xprin:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Setup homebrew
        id: setup-homebrew
        uses: Homebrew/actions/setup-homebrew@9db18afa3016668c5f7e0b5d65c4eed7c1c0739e
      - name: Install the new xprin formula version
        run: brew install tampakrap/tap/xprin
      - name: Install the new xprin-helpers formula version
        run: brew install tampakrap/tap/xprin-helpers
      - name: Cache Homebrew Bundler RubyGems
        id: cache-rubygems
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
        with:
          path: ${{ steps.setup-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-brew-test-rubygems-${{ steps.setup-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-brew-test-rubygems-
      - name: Install Homebrew Bundler RubyGems
        if: steps.cache-rubygems.outputs.cache-hit != 'true'
        run: brew install-bundler-gems
      - name: Test the new xprin formula version
        run: brew test xprin
      - name: Test the new xprin-helpers formula version
        run: brew test xprin-helpers
      - run: xprin version
      - run: xprin-helpers version
